<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0d0d0d;
            background-image: url({% static 'club_app/images/stadium.jpg' %});
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e8e0d5;
            min-height: 100vh;
        }

        /* dark overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(6, 5, 3, 0.85);
            z-index: 0;
        }

        .main-wrap {
            position: relative;
            z-index: 1;
        }

        /* ── Alert ── */
        .alert {
            width: 50%;
            margin: 20px auto;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
        }

        /* ── Two-column layout ── */
        .login-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            min-height: calc(100vh - 70px);
            padding: 40px 40px 60px;
        }

        /* ── Left: sports image ── */
        .login-image-wrap {
            flex: 0 0 auto;
            width: 380px;
        }

        .login-image-wrap img {
            width: 100%;
            height: 460px;
            object-fit: cover;
            object-position: top;
            border-radius: 24px;
            border: 1px solid rgba(200, 169, 110, 0.3);
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,169,110,0.15);
            display: block;
        }

        /* ── Right: form card ── */
        .login-form-wrap {
            flex: 0 0 auto;
            width: 400px;
        }

        .form-card {
            background: #111;
            border: 1px solid rgba(200, 169, 110, 0.22);
            border-top: 3px solid #c8a96e;
            border-radius: 18px;
            padding: 40px 40px 44px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        }

        /* ── Heading ── */
        .form-card h1 {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #e8c98a 0%, #c8a96e 60%, #a07840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .form-subtitle {
            text-align: center;
            font-size: 11px;
            color: #555;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        /* ── Input groups ── */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group-text {
            background: rgba(200,169,110,0.1) !important;
            border: 1px solid rgba(200,169,110,0.2) !important;
            border-right: none !important;
            color: #c8a96e !important;
            border-radius: 9px 0 0 9px !important;
            font-size: 14px;
        }

        .form-control {
            background: #0d0d0d !important;
            border: 1px solid rgba(200,169,110,0.2) !important;
            border-left: none !important;
            border-radius: 0 9px 9px 0 !important;
            color: #e8e0d5 !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 14px !important;
            padding: 10px 14px !important;
            height: auto !important;
            line-height: 1.5 !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control::placeholder {
            color: #3a3a3a !important;
        }

        .form-control:focus {
            border-color: #c8a96e !important;
            box-shadow: 0 0 0 3px rgba(200,169,110,0.12) !important;
            background: #0f0f0f !important;
            outline: none;
            z-index: 1;
        }

        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: #c8a96e !important;
        }

        .invalid-feedback {
            color: #e05555;
            font-size: 11.5px;
            margin-top: 5px;
        }

        /* ── Submit button ── */
        .submit-wrap {
            text-align: center;
            margin-top: 28px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #c8a96e, #a07840);
            border: none;
            color: #0d0d0d;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 11px 0;
            width: 60%;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 4px 18px rgba(200,169,110,0.3);
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(200,169,110,0.45);
        }

        /* ── Sign-up link ── */
        .signup-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 22px;
            font-size: 13px;
            color: #555;
            list-style: none;
        }

        .signup-row a {
            color: #c8a96e;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .signup-row a:hover {
            color: #e8c98a;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .login-layout { flex-direction: column; gap: 32px; padding: 32px 20px 48px; }
            .login-image-wrap { width: 100%; max-width: 380px; }
            .login-form-wrap { width: 100%; max-width: 440px; }
        }
    </style>
</head>

<body>

    <div class="main-wrap">
        {% include 'club_app/common_files/common_header.html' %}

        {% if messages %}
            {% for m in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert" style="width:50%; margin:20px auto;">
                <strong>{{ m }}</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        {% endif %}

        <div class="login-layout">

            <!-- Left: image -->
            <div class="login-image-wrap">
                <img src="{% static 'club_app/images/sports_loginimg.avif' %}" alt="Sports image">
            </div>

            <!-- Right: form -->
            <div class="login-form-wrap">
                <div class="form-card">
                    <h1>Login Form</h1>
                    <p class="form-subtitle">Welcome back — sign in to continue</p>

                    <form action="/member_login/" method="post" class="needs-validation" novalidate>
                        {% csrf_token %}

                        <div class="input-group mt-3">
                            <label for="email" class="input-group-text"><i class="fas fa-at"></i></label>
                            <input type="text" placeholder="Enter your Mail-id" class="form-control" name="id" required>
                            <div class="invalid-feedback">Member ID required</div>
                        </div>

                        <div class="input-group mt-3">
                            <label for="password" class="input-group-text"><i class="fas fa-eye-slash"></i></label>
                            <input type="password" placeholder="Enter your Password" class="form-control" name="password" required>
                            <div class="invalid-feedback">Member password required</div>
                        </div>

                        <div class="submit-wrap">
                            <button type="submit" class="btn-submit">Submit</button>
                        </div>

                        <ul style="padding:0; margin:0;">
                            <li class="signup-row">
                                <span>New here?</span>
                                <a href="/member_registration/">
                                    Sign-Up <i class="fas fa-user-plus"></i>
                                </a>
                            </li>
                        </ul>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'club_app/JS/validation.js' %}"></script>
</body>
</html>
