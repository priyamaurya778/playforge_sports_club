<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    {% include 'club_app/common_files/common_css.html' %}

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0d0d0d;
            color: #e8e0d5;
            min-height: 100vh;
        }

        .main-body {
            padding: 48px 40px 64px;
        }

        /* ── Headings ── */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }

        /* ── Paragraph reset (prevents inherited bg/shadow from Bootstrap) ── */
        p {
            background: none;
            box-shadow: none;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(200,169,110,0.5); }

        {% block style %}{% endblock %}
    </style>
</head>
<body>
    {% include 'club_app/member/member_header.html' %}

    <div class="main-body">
        {% block content %}{% endblock %}
    </div>

    {% include 'club_app/common_files/common_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
